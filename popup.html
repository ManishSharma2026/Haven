<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haven</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="card">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>

      <div class="top">
        <div class="logo-wrap">
          <div class="logo">H</div>
          <div>
            <h1>Haven</h1>
            <p class="subtitle">Protecting your browsing</p>
          </div>
        </div>
      </div>

      <button id="scanBtn">Scan Page</button>

      <div id="resultCard" class="result-card idle">
        <div class="status-label">Status</div>
        <div id="resultText" class="result-text">Not scanned yet</div>
        <div id="resultSubtext" class="result-subtext">
          Click scan to begin analysis.
        </div>
      </div>

      <div class="lens-box">
        <div class="lens-row">
          <span>Misinformation Lens</span>
          <span class="badge active">Active</span>
        </div>
        <div class="lens-row">
          <span>AI Lens</span>
          <span class="badge soon">Coming Soon</span>
        </div>
        <div class="lens-row">
          <span>Source Trace</span>
          <span class="badge soon">Coming Soon</span>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
